server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;
    gzip_disable "msie6";

    # Service worker & its registration must ALWAYS revalidate. Otherwise the
    # immutable ".js" rule below would pin an old service worker for a year and
    # block PWA autoUpdate — users would stay stuck on a stale bundle after deploys.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # Hashed static assets — content-hashed filenames, safe to cache forever.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sound Day — статическая брендовая страница с QR (не React-роут).
    # Должна стоять ПЕРЕД SPA-catch-all, иначе /soundday уедет в index.html.
    location = /soundday {
        try_files /soundday.html =404;
        add_header Cache-Control "no-cache";
    }

    # SPA entry — never cache index.html, so new asset hashes are picked up
    # immediately on the next load instead of after a heuristic cache expiry.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
